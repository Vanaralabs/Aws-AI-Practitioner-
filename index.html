<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS AI Quest - Complete Edition</title>
<meta name="description" content="Gamified study app for the AWS Certified AI Practitioner (AIF-C01) exam - lessons, quizzes, mock exams and badges.">
<meta name="theme-color" content="#0a0e1a">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#FF9900;--primary-glow:rgba(255,153,0,0.3);--primary-dark:#E88B00;
  --bg:#0a0e1a;--bg-card:rgba(20,27,45,0.8);--bg-card-solid:#141b2d;--bg-elevated:#1a2340;
  --glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);
  --text:#f0f4ff;--text-dim:#9aa5bd;--text-muted:#7a8599;
  --success:#00e676;--success-glow:rgba(0,230,118,0.25);
  --danger:#ff4757;--danger-glow:rgba(255,71,87,0.25);
  --warning:#ffd32a;--info:#4fc3f7;
  --xp-gradient:linear-gradient(135deg,#FF9900,#ffcc00,#FF9900);
  --combo-gradient:linear-gradient(135deg,#f093fb,#f5576c);
  --neon-glow:0 0 20px var(--primary-glow),0 0 40px rgba(255,153,0,0.1);
  --card-shadow:0 4px 24px rgba(0,0,0,0.4);
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
}
html{scroll-behavior:smooth}
/* Accessibility: reset native button chrome so buttons used as cards/options
   look identical to the old clickable <div>s, but remain keyboard/AT accessible */
button.lesson-card,button.quiz-option,button.mock-card{
  font-family:inherit;color:inherit;text-align:left;display:block;width:100%;
  border:1px solid var(--glass-border);background:var(--bg-card);
}
button.quiz-option{text-align:left;background:var(--bg-elevated)}
button.mock-card{text-align:center}
button.lesson-card:disabled,button.quiz-option:disabled{cursor:default;opacity:1}
:focus-visible{outline:2px solid var(--info);outline-offset:2px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.5;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,153,0,0.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(79,195,247,0.02) 0%,transparent 40%);pointer-events:none;z-index:0}

.app{max-width:880px;margin:0 auto;padding:12px;position:relative;z-index:1}

/* ===== HEADER ===== */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--bg-card);backdrop-filter:blur(12px);border-radius:var(--radius-lg);margin-bottom:12px;border:1px solid var(--glass-border);box-shadow:var(--card-shadow)}
.header-left{display:flex;align-items:center;gap:14px}
.avatar{width:48px;height:48px;border-radius:50%;background:conic-gradient(from 0deg,#FF9900,#ffcc00,#FF9900);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#000;position:relative;animation:avatarPulse 3s ease infinite}
.avatar::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 0deg,var(--primary),transparent,var(--primary));opacity:0.4;animation:spin 4s linear infinite;z-index:-1}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes avatarPulse{0%,100%{box-shadow:0 0 0 0 var(--primary-glow)}50%{box-shadow:0 0 0 6px transparent}}
.level-info h3{font-size:14px;font-weight:700;color:var(--primary);letter-spacing:-0.3px}
.level-info span{font-size:11px;color:var(--text-dim)}
.xp-bar-container{width:130px;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-top:4px;position:relative}
.xp-bar-fill{height:100%;background:var(--xp-gradient);background-size:200% 100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);animation:shimmer 2s ease infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.stats-row{display:flex;gap:12px}
.stat{text-align:center;padding:6px 10px;background:var(--glass);border-radius:var(--radius-sm);border:1px solid var(--glass-border);min-width:60px}
.stat-val{font-size:15px;font-weight:700}
.stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-top:1px}

/* ===== NAVIGATION ===== */
.nav{display:flex;gap:3px;margin-bottom:14px;background:var(--bg-card);backdrop-filter:blur(8px);border-radius:var(--radius);padding:4px;border:1px solid var(--glass-border)}
.nav-btn{flex:1;padding:10px 6px;border:none;background:transparent;color:var(--text-dim);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:600;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);white-space:nowrap;font-family:inherit;position:relative;overflow:hidden}
.nav-btn.active{background:var(--primary);color:#000;box-shadow:0 2px 12px var(--primary-glow)}
.nav-btn:hover:not(.active){background:rgba(255,255,255,0.05);color:var(--text)}
.nav-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);opacity:0;transition:opacity 0.2s}
.nav-btn:hover::after{opacity:1}

/* ===== DOMAIN SECTIONS ===== */
.domain-section{margin-bottom:24px}
.domain-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;padding:10px 14px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between}
.domain-title .d-name{display:flex;align-items:center;gap:8px}
.domain-title .d-progress{font-size:11px;color:var(--text-dim);background:var(--glass);padding:3px 8px;border-radius:6px}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.lesson-card{background:var(--bg-card);border:1px solid var(--glass-border);border-radius:var(--radius);padding:16px 14px;cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.lesson-card:hover{transform:translateY(-3px);border-color:rgba(255,153,0,0.3);box-shadow:0 8px 24px rgba(0,0,0,0.3),0 0 0 1px rgba(255,153,0,0.1)}
.lesson-card:active{transform:translateY(-1px);transition:0.1s}
.lesson-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--primary),transparent);opacity:0;transition:opacity 0.3s}
.lesson-card:hover::before{opacity:1}
.lesson-card .icon{font-size:26px;margin-bottom:8px;display:block}
.lesson-card .title{font-size:11.5px;font-weight:600;line-height:1.4;color:var(--text)}
.lesson-card .progress{font-size:10px;color:var(--text-dim);margin-top:8px}
.lesson-card .xp-badge{position:absolute;top:10px;right:10px;background:rgba(255,153,0,0.15);color:var(--primary);font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;border:1px solid rgba(255,153,0,0.2)}
.lesson-card.completed{border-color:rgba(0,230,118,0.3);background:rgba(0,230,118,0.03)}
.lesson-card.completed::after{content:'✓';position:absolute;top:10px;right:10px;background:var(--success);color:#000;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 0 12px var(--success-glow)}

/* ===== TEACH CARDS ===== */
.teach-container{background:var(--bg-card);border-radius:var(--radius-lg);padding:24px;border:1px solid var(--glass-border);box-shadow:var(--card-shadow)}
.teach-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.teach-header h2{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.card-counter{font-size:11px;color:var(--text-dim);background:var(--glass);padding:5px 12px;border-radius:20px;border:1px solid var(--glass-border)}
.teach-card{background:var(--bg-elevated);border-radius:var(--radius);padding:22px;min-height:200px;margin-bottom:18px;border:1px solid var(--glass-border);animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.teach-card h3{color:var(--primary);font-size:15px;margin-bottom:12px;font-weight:700}
.teach-card p,.teach-card li{font-size:13px;line-height:1.7;color:var(--text)}
.teach-card ul,.teach-card ol{padding-left:18px;margin:6px 0}
.teach-card li{margin-bottom:3px}
.teach-card b{color:var(--primary);font-weight:700}
.teach-card .highlight{background:rgba(255,153,0,0.08);padding:10px 14px;border-radius:var(--radius-sm);margin:10px 0;border-left:3px solid var(--primary);font-size:12px;line-height:1.6}
.teach-card .trap{background:rgba(255,71,87,0.06);padding:10px 14px;border-radius:var(--radius-sm);margin:10px 0;border-left:3px solid var(--danger);font-size:12px;line-height:1.6}
.teach-card table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.teach-card th,.teach-card td{padding:7px 10px;border:1px solid var(--glass-border);text-align:left}
.teach-card th{background:rgba(255,153,0,0.08);color:var(--primary);font-weight:600}
.teach-nav{display:flex;gap:10px;justify-content:center}
.teach-nav button,.back-btn,.save-btn{font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s cubic-bezier(0.4,0,0.2,1)}
.btn-next{padding:11px 28px;border:none;border-radius:var(--radius-sm);background:var(--primary);color:#000;font-weight:700;font-size:13px}
.btn-next:hover{background:var(--primary-dark);box-shadow:0 4px 16px var(--primary-glow);transform:translateY(-1px)}
.btn-prev{padding:11px 28px;border:1px solid var(--glass-border);border-radius:var(--radius-sm);background:var(--glass);color:var(--text);font-weight:600;font-size:13px}
.btn-prev:hover{border-color:var(--text-dim);background:rgba(255,255,255,0.06)}
.btn-quiz{padding:11px 28px;border:none;border-radius:var(--radius-sm);background:var(--success);color:#000;font-weight:700;font-size:13px}
.btn-quiz:hover{box-shadow:0 4px 16px var(--success-glow);transform:translateY(-1px)}
.back-btn{background:none;border:1px solid var(--glass-border);color:var(--text-dim);padding:7px 14px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:14px;font-weight:500}
.back-btn:hover{border-color:var(--primary);color:var(--primary)}

/* ===== QUIZ ===== */
.quiz-container{background:var(--bg-card);border-radius:var(--radius-lg);padding:24px;border:1px solid var(--glass-border);box-shadow:var(--card-shadow)}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.quiz-header h3{font-size:15px;font-weight:700}
.quiz-question{font-size:14px;line-height:1.7;margin-bottom:18px;font-weight:500;letter-spacing:-0.2px}
.quiz-options{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.quiz-option{padding:13px 18px;background:var(--bg-elevated);border:1px solid var(--glass-border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.quiz-option:hover{border-color:rgba(79,195,247,0.4);background:rgba(79,195,247,0.04);transform:translateX(4px)}
.quiz-option.correct{border-color:var(--success);background:rgba(0,230,118,0.08);box-shadow:0 0 0 1px var(--success),0 4px 12px var(--success-glow);animation:correctPulse 0.4s ease}
.quiz-option.wrong{border-color:var(--danger);background:rgba(255,71,87,0.08);box-shadow:0 0 0 1px var(--danger);animation:shake 0.4s ease}
@keyframes correctPulse{0%{transform:scale(1)}50%{transform:scale(1.01)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.explanation{background:var(--bg-elevated);border-radius:var(--radius-sm);padding:14px 16px;margin-top:14px;font-size:12px;line-height:1.6;border-left:3px solid var(--info);animation:fadeIn 0.3s ease}

/* ===== MOCK TEST ===== */
.mock-menu{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mock-card{background:var(--bg-card);border:1px solid var(--glass-border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all 0.25s;text-align:center;position:relative;overflow:hidden}
.mock-card:hover{border-color:rgba(255,153,0,0.3);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.mock-card .mock-icon{font-size:36px;margin-bottom:10px}
.mock-card h3{font-size:14px;margin-bottom:4px;font-weight:700}
.mock-card p{font-size:11px;color:var(--text-dim)}
.mock-card.full-test{grid-column:1/-1;background:linear-gradient(135deg,rgba(20,27,45,0.9),rgba(30,40,70,0.9));border-color:rgba(79,195,247,0.3)}
.mock-card.full-test:hover{border-color:var(--info);box-shadow:0 8px 24px rgba(79,195,247,0.15)}

.timer{background:var(--bg-elevated);padding:7px 14px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;font-family:'Inter',monospace;border:1px solid var(--glass-border)}
.timer.warning{color:var(--warning);border-color:rgba(255,211,42,0.3)}
.timer.danger{color:var(--danger);border-color:rgba(255,71,87,0.3);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:0.6}}

/* ===== BADGES ===== */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:10px}
.badge{text-align:center;padding:14px 8px;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--glass-border);transition:all 0.3s}
.badge.earned{border-color:rgba(255,153,0,0.4);box-shadow:0 0 16px rgba(255,153,0,0.1)}
.badge .badge-icon{font-size:32px;filter:grayscale(1) brightness(0.4);transition:all 0.3s}
.badge.earned .badge-icon{filter:none;animation:badgeBounce 0.5s ease}
@keyframes badgeBounce{0%{transform:scale(0.5)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.badge .badge-name{font-size:10px;margin-top:6px;color:var(--text-dim);font-weight:600}
.badge.earned .badge-name{color:var(--text)}
.badge .badge-desc{font-size:8px;color:var(--text-muted);margin-top:2px}

/* ===== SAVED ===== */
.saved-list{display:flex;flex-direction:column;gap:10px}
.saved-item{background:var(--bg-card);border:1px solid var(--glass-border);border-radius:var(--radius);padding:14px 16px}
.saved-item .q-text{font-size:12px;line-height:1.5;margin-bottom:6px}
.saved-item .q-answer{font-size:11px;color:var(--success);font-weight:600}
.saved-item .q-domain{font-size:10px;color:var(--primary);margin-bottom:5px;font-weight:600}
.save-btn{background:none;border:1px solid rgba(255,211,42,0.4);color:var(--warning);padding:5px 12px;border-radius:var(--radius-sm);font-size:11px;margin-top:8px;font-weight:600}
.save-btn:hover{background:rgba(255,211,42,0.08)}
.save-btn.saved{border-color:rgba(0,230,118,0.4);color:var(--success)}

/* ===== RESULTS ===== */
.results-container{text-align:center;padding:36px 20px}
.results-score{font-size:56px;font-weight:900;background:var(--xp-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-2px;animation:scoreReveal 0.6s ease}
@keyframes scoreReveal{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.results-label{font-size:14px;color:var(--text-dim);margin-bottom:24px;font-weight:500}
.results-breakdown{text-align:left;background:var(--bg-elevated);border-radius:var(--radius);padding:18px;margin-top:20px;border:1px solid var(--glass-border)}
.results-breakdown h4{font-size:13px;margin-bottom:12px;color:var(--primary);font-weight:700}
.domain-score{display:flex;justify-content:space-between;padding:8px 0;font-size:12px;border-bottom:1px solid var(--glass-border)}
.domain-score:last-child{border-bottom:none}

/* ===== POPUPS ===== */
.combo-display{position:fixed;top:20px;right:20px;background:var(--combo-gradient);padding:10px 20px;border-radius:24px;font-weight:800;font-size:15px;color:#fff;z-index:100;display:none;box-shadow:0 4px 20px rgba(245,87,108,0.4)}
.combo-display.show{display:block;animation:comboPop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes comboPop{from{transform:scale(0.3) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.streak-fire{position:fixed;top:70px;right:25px;font-size:28px;z-index:100;display:none}
.streak-fire.show{display:block;animation:fireFloat 1.5s ease forwards}
@keyframes fireFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-40px) scale(1.3);opacity:0}}
.xp-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,14,26,0.95);border:2px solid var(--primary);border-radius:var(--radius-lg);padding:28px 44px;text-align:center;z-index:200;display:none;backdrop-filter:blur(12px);box-shadow:var(--neon-glow)}
.xp-popup.show{display:block;animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(0.7);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
#xp-amount{color:var(--primary);font-size:28px;font-weight:900}
#xp-reason{color:var(--text-dim);font-size:12px;margin-top:4px}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .header{flex-direction:column;gap:12px;align-items:stretch}
  .header-left{justify-content:center}
  .stats-row{justify-content:center}
  .lesson-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .mock-menu{grid-template-columns:1fr}
  .quiz-container,.teach-container{padding:16px}
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* ===== SELECTION ===== */
::selection{background:rgba(255,153,0,0.3);color:#fff}
</style>
</head>
<body>
<noscript>
  <div style="max-width:600px;margin:60px auto;padding:24px;font-family:sans-serif;text-align:center">
    <h1>JavaScript required</h1>
    <p>AWS AI Quest is an interactive study app that needs JavaScript enabled to run. Please enable JavaScript in your browser and reload this page.</p>
  </div>
</noscript>
<main class="app" id="app"></main>
<div class="combo-display" id="combo" role="status" aria-live="polite"></div>
<div class="streak-fire" id="streak-fire" aria-hidden="true">🔥</div>
<div class="xp-popup" id="xp-popup" role="status" aria-live="polite"><div id="xp-amount"></div><div id="xp-reason"></div></div>
<script>

// ========== COMPLETE LESSON DATA ==========
var LESSONS = [
  // DOMAIN 1: AI/ML Fundamentals (20%) - 9 lessons
  {id:1, domain:1, icon:"🧠", title:"AI vs ML vs DL vs GenAI vs Agentic AI", xp:100,
   cards:[
    {title:"The AI Family Tree", content:"<p><b>Artificial Intelligence (AI)</b> = Any system that mimics human intelligence (decisions, speech, vision).</p><p><b>Machine Learning (ML)</b> = A SUBSET of AI. System learns from data without being explicitly programmed. (AI that learns from examples.)</p><p><b>Deep Learning (DL)</b> = A SUBSET of ML. Uses neural networks with many layers. Handles images, speech, text.</p><p><b>Generative AI (GenAI)</b> = A SUBSET of DL. Creates NEW content (text, images, code, video).</p><p><b>Agentic AI</b> = AI that can take ACTIONS autonomously (browse web, call APIs, make decisions in loops).</p><div class='highlight'>Think of it as: AI ⊃ ML ⊃ DL ⊃ GenAI. Agentic AI is a capability layer that can use any of these.</div>"},
    {title:"Key Differences — Exam Focus", content:"<table><tr><th>Type</th><th>What it does</th><th>Example</th></tr><tr><td>Traditional AI</td><td>Rules-based decisions</td><td>Chess engine, expert systems</td></tr><tr><td>ML</td><td>Learns patterns from data</td><td>Spam filter, fraud detection</td></tr><tr><td>Deep Learning</td><td>Complex pattern recognition</td><td>Image recognition, speech-to-text</td></tr><tr><td>GenAI</td><td>Creates new content</td><td>ChatGPT, DALL-E, Amazon Nova</td></tr><tr><td>Agentic AI</td><td>Plans + acts autonomously</td><td>Bedrock Agents, Strands Agents</td></tr></table><div class='trap'>⚠️ TRAP: 'Deep learning requires neural networks' = TRUE. 'ML requires neural networks' = FALSE (ML includes simple algorithms like linear regression).</div>"},
    {title:"Neural Networks Simplified", content:"<p>A <b>Neural Network</b> = layers of connected nodes (like brain neurons). Data flows in → gets transformed → prediction comes out.</p><ul><li><b>Input layer</b> — receives raw data</li><li><b>Hidden layers</b> — find patterns (more layers = 'deeper')</li><li><b>Output layer</b> — gives the answer</li></ul><p><b>Types you need to know:</b></p><ul><li><b>CNN</b> (Convolutional) = Images 📷</li><li><b>RNN</b> (Recurrent) = Sequences/Time-series 📈</li><li><b>Transformer</b> = Modern LLMs, handles everything 🤖</li></ul><div class='highlight'>Exam tip: CNN=pictures, RNN=sequences, Transformer=the architecture behind ALL modern LLMs (GPT, Claude, Nova)</div>"}
   ],
   questions:[
    {q:"Which is the correct hierarchy from broadest to narrowest?", opts:["ML ⊃ AI ⊃ DL ⊃ GenAI","AI ⊃ ML ⊃ DL ⊃ GenAI","AI ⊃ DL ⊃ ML ⊃ GenAI","GenAI ⊃ DL ⊃ ML ⊃ AI"], ans:1, exp:"AI is the broadest field. ML is a subset of AI. Deep Learning is a subset of ML. GenAI is a subset of DL."},
    {q:"A system that autonomously browses the web, calls APIs, and makes multi-step decisions is best described as:", opts:["Machine Learning","Deep Learning","Generative AI","Agentic AI"], ans:3, exp:"Agentic AI = AI that takes autonomous actions in loops (plan, act, observe, repeat). It USES GenAI but adds autonomous action capability."},
    {q:"Which neural network type is specifically designed for image recognition?", opts:["RNN","Transformer","CNN","GAN"], ans:2, exp:"CNN (Convolutional Neural Network) = designed for images. Uses filters to detect edges, shapes, objects."},
    {q:"What distinguishes ML from traditional programming?", opts:["ML uses more computing power","ML learns from data instead of explicit rules","ML always uses neural networks","ML requires labeled data"], ans:1, exp:"Traditional programming: humans write rules. ML: the system learns rules from data. Not all ML uses neural networks (e.g., decision trees, SVMs)."},
    {q:"A company needs an AI that can write marketing copy, generate product images, AND automatically post them to social media. This requires:", opts:["Just GenAI","Just Agentic AI","GenAI for content + Agentic AI for autonomous posting","Deep Learning only"], ans:2, exp:"GenAI creates the content (text + images). Agentic AI handles the autonomous action of posting to social media. You need both capabilities."}
   ]
  },
  {id:2, domain:1, icon:"📊", title:"Data Types & Learning Types", xp:100,
   cards:[
    {title:"Data Types for AI", content:"<table><tr><th>Type</th><th>Meaning</th><th>Example</th></tr><tr><td><b>Labeled</b></td><td>Data with known answers</td><td>Emails tagged 'spam/not spam'</td></tr><tr><td><b>Unlabeled</b></td><td>No answers provided</td><td>Random customer photos</td></tr><tr><td><b>Structured</b></td><td>Organized in rows/columns</td><td>Database tables, spreadsheets</td></tr><tr><td><b>Unstructured</b></td><td>No fixed format</td><td>Emails, images, videos, PDFs</td></tr><tr><td><b>Tabular</b></td><td>Table format</td><td>CSV files, SQL tables</td></tr><tr><td><b>Time-series</b></td><td>Data over time</td><td>Stock prices, sensor readings</td></tr></table><div class='highlight'>80% of real-world data is UNSTRUCTURED. GenAI is great at handling unstructured data!</div>"},
    {title:"Three Learning Types", content:"<p><b>1. Supervised Learning</b> = Teacher gives answers (labeled data)</p><ul><li>Classification (cat/dog, spam/not spam)</li><li>Regression (predict house price, temperature)</li></ul><p><b>2. Unsupervised Learning</b> = No teacher, find patterns alone</p><ul><li>Clustering (group similar customers)</li><li>Anomaly detection (find fraud)</li><li>Dimensionality reduction</li></ul><p><b>3. Reinforcement Learning (RL)</b> = Learn by trial & error + rewards</p><ul><li>Game playing, robotics, recommendations</li><li>RLHF (how ChatGPT is trained to be helpful)</li></ul><div class='trap'>⚠️ TRAP: Anomaly detection = UNSUPERVISED (it finds outliers without being told what's abnormal)</div>"},
    {title:"Inference Types", content:"<p>Once a model is trained, <b>inference</b> = using it to make predictions.</p><table><tr><th>Type</th><th>When</th><th>Use Case</th></tr><tr><td><b>Real-time</b></td><td>Instant response needed</td><td>Chatbot, fraud check at checkout</td></tr><tr><td><b>Batch</b></td><td>Process many items later</td><td>Overnight report generation</td></tr><tr><td><b>Asynchronous</b></td><td>Submit job, get results later</td><td>Video processing, large document analysis</td></tr><tr><td><b>Serverless</b></td><td>Auto-scales, pay per use</td><td>Unpredictable traffic, cost savings</td></tr></table><div class='highlight'>Real-time = lowest latency, highest cost. Batch = highest throughput, lowest cost. Serverless = best for variable/unpredictable workloads.</div>"}
   ],
   questions:[
    {q:"A company has customer purchase data but no labels. They want to group customers by buying behavior. Which approach?", opts:["Supervised classification","Supervised regression","Unsupervised clustering","Reinforcement learning"], ans:2, exp:"No labels + grouping similar items = unsupervised clustering. Classification needs labeled data."},
    {q:"Which inference type is best for processing 10,000 invoices overnight?", opts:["Real-time","Batch","Serverless","Synchronous"], ans:1, exp:"Batch inference = process many items together when instant response isn't needed. Most cost-effective for large volumes."},
    {q:"Training an AI assistant to be helpful using human feedback (thumbs up/down) is an example of:", opts:["Supervised learning","Unsupervised learning","Reinforcement Learning from Human Feedback","Transfer learning"], ans:2, exp:"RLHF = Reinforcement Learning from Human Feedback. The model learns from reward signals (human ratings) rather than labeled examples."},
    {q:"Time-series data is best described as:", opts:["Data organized in tables","Data collected sequentially over time","Data without any structure","Data with labels"], ans:1, exp:"Time-series = data points collected at successive time intervals. Examples: stock prices, temperature readings, IoT sensor data."},
    {q:"A chatbot that must respond to users within 200ms needs which inference type?", opts:["Batch","Asynchronous","Real-time","Serverless"], ans:2, exp:"Real-time inference = immediate response. Required when users are waiting (chatbots, checkout fraud detection, live recommendations)."}
   ]
  },
  {id:3, domain:1, icon:"🎯", title:"Problem Types & Use Cases", xp:100,
   cards:[
    {title:"ML Problem Types", content:"<table><tr><th>Problem</th><th>Output</th><th>Example</th></tr><tr><td><b>Classification</b></td><td>Category/Label</td><td>Spam or not? Cat or dog?</td></tr><tr><td><b>Regression</b></td><td>Number</td><td>What price? What temperature?</td></tr><tr><td><b>Clustering</b></td><td>Groups</td><td>Customer segments</td></tr><tr><td><b>Ranking</b></td><td>Ordered list</td><td>Search results, recommendations</td></tr><tr><td><b>Generation</b></td><td>New content</td><td>Text, images, code</td></tr></table><div class='highlight'>Classification = discrete labels. Regression = continuous numbers. If the answer is a category → classification. If it's a number → regression.</div>"},
    {title:"When AI is NOT Appropriate", content:"<p><b>Don't use AI when:</b></p><ul><li>You need a <b>deterministic</b> (100% guaranteed) outcome — AI gives probabilities, not certainties</li><li>The <b>cost exceeds the benefit</b> — small dataset or simple rule-based logic suffices</li><li><b>Not enough data</b> to train a reliable model</li><li><b>Explainability is legally required</b> and you need a transparent model (consider simpler ML over deep learning)</li><li>The problem is <b>already solved by a simple formula</b></li></ul><div class='trap'>⚠️ EXAM TRAP: 'AI can solve any problem with enough data' = FALSE. Some problems need deterministic rules (e.g., tax calculations with specific legal formulas).</div>"},
    {title:"Real-World AI Applications", content:"<table><tr><th>Domain</th><th>Application</th><th>ML Type</th></tr><tr><td>Healthcare</td><td>Disease detection from X-rays</td><td>Classification (CNN)</td></tr><tr><td>Finance</td><td>Fraud detection</td><td>Anomaly detection</td></tr><tr><td>Retail</td><td>Product recommendations</td><td>Ranking/Collaborative filtering</td></tr><tr><td>NLP</td><td>Sentiment analysis</td><td>Classification</td></tr><tr><td>Manufacturing</td><td>Predictive maintenance</td><td>Time-series regression</td></tr><tr><td>GenAI</td><td>Code generation</td><td>Generation (Transformer)</td></tr></table><div class='highlight'>Forecasting (predicting future values) = Regression on time-series data. Not classification!</div>"}
   ],
   questions:[
    {q:"Predicting tomorrow's stock price is an example of:", opts:["Classification","Regression","Clustering","Generation"], ans:1, exp:"Stock price = a continuous number. Predicting numbers = regression. If it were 'will stock go UP or DOWN' (category), that would be classification."},
    {q:"A bank wants to identify unusual transactions that might be fraud, but has very few examples of actual fraud. Best approach?", opts:["Supervised classification","Unsupervised anomaly detection","Regression","GenAI"], ans:1, exp:"Few fraud examples = hard to do supervised learning. Anomaly detection (unsupervised) finds outliers without needing many labeled fraud cases."},
    {q:"Which scenario is LEAST appropriate for AI/ML?", opts:["Predicting customer churn","Calculating sales tax using fixed legal rates","Detecting spam emails","Recommending products"], ans:1, exp:"Sales tax = deterministic formula set by law. No learning needed — a simple rule-based calculation is better, cheaper, and 100% accurate."},
    {q:"A company wants to group its millions of products into categories automatically without pre-defining the categories. This is:", opts:["Supervised classification","Unsupervised clustering","Regression","Reinforcement learning"], ans:1, exp:"Grouping without pre-defined labels = unsupervised clustering. The algorithm discovers the natural groupings in the data."},
    {q:"Computer vision for quality inspection on a factory line (detecting defective products) uses:", opts:["Regression","Clustering","Classification with CNN","Generation"], ans:2, exp:"Defective vs. not defective = classification (2 categories). Factory images = CNN (best for image data)."}
   ]
  },
  {id:4, domain:1, icon:"📏", title:"Metrics: Precision, Recall, F1 & Business", xp:150,
   cards:[
    {title:"Precision vs Recall — The Key Difference", content:"<p>Imagine a cancer screening test:</p><p><b>PRECISION</b> = Of all patients the test said have cancer, how many ACTUALLY have cancer?</p><p>→ 'Don\'t cry wolf' — avoid false alarms</p><p><b>RECALL</b> = Of all patients who ACTUALLY have cancer, how many did the test catch?</p><p>→ 'Catch them all / Don\'t miss any' — avoid missing real cases</p><div class='highlight'>🎯 Memory trick:<br>• PRECISION = 'P for Purity' — how pure/accurate are your positive predictions?<br>• RECALL = 'R for Reach' — how many real positives did you reach/find?</div><div class='trap'>⚠️ #1 EXAM TRAP: Cancer/fraud/safety → maximize RECALL (don't miss any). Spam filter → maximize PRECISION (don't block real emails).</div>"},
    {title:"All Model Metrics", content:"<table><tr><th>Metric</th><th>What it measures</th><th>Formula</th></tr><tr><td><b>Accuracy</b></td><td>Overall correctness</td><td>Correct / Total</td></tr><tr><td><b>Precision</b></td><td>Don't cry wolf</td><td>TP / (TP + FP)</td></tr><tr><td><b>Recall</b></td><td>Catch all positives</td><td>TP / (TP + FN)</td></tr><tr><td><b>F1 Score</b></td><td>Balance of P & R</td><td>2×(P×R)/(P+R)</td></tr><tr><td><b>AUC-ROC</b></td><td>Model's ability to distinguish classes</td><td>Area under curve (0.5=random, 1=perfect)</td></tr></table><div class='highlight'>F1 = harmonic mean of Precision & Recall. Use when you need BOTH to be good and data is imbalanced.</div>"},
    {title:"Business Metrics", content:"<p>AWS exams also test business metrics to evaluate ML projects:</p><table><tr><th>Metric</th><th>What it measures</th></tr><tr><td><b>ROI</b></td><td>Return on investment — was the ML project worth the cost?</td></tr><tr><td><b>Cost per user</b></td><td>How much does it cost to serve each user?</td></tr><tr><td><b>Customer feedback</b></td><td>Qualitative user satisfaction</td></tr><tr><td><b>Development costs</b></td><td>Total cost to build & maintain the model</td></tr><tr><td><b>Task completion rate</b></td><td>% of tasks successfully completed by AI</td></tr><tr><td><b>User satisfaction</b></td><td>Net Promoter Score, ratings</td></tr></table><div class='highlight'>Technical metrics (F1, accuracy) tell you if the model works. Business metrics tell you if it's WORTH IT.</div>"}
   ],
   questions:[
    {q:"A hospital wants a cancer screening test that catches ALL potential cancer cases, even if some healthy people get flagged. They should maximize:", opts:["Precision","Recall","Accuracy","AUC"], ans:1, exp:"'Catch all cases' = RECALL. In medical screening, missing cancer (false negative) is much worse than a false alarm (false positive)."},
    {q:"A spam filter should avoid blocking legitimate emails. The team should maximize:", opts:["Recall","Precision","F1","Accuracy"], ans:1, exp:"'Don't block real emails' = minimize false positives = PRECISION. A false positive (real email in spam) is worse than missing some spam."},
    {q:"A model has 95% accuracy on a dataset where 95% of samples belong to one class. This model is:", opts:["Excellent","Probably just predicting the majority class","Well-balanced","Overfitting"], ans:1, exp:"95% accuracy on 95% majority class = the model could just be predicting the majority class every time! Accuracy is misleading with imbalanced data. Use F1 or AUC instead."},
    {q:"Which metric balances both precision and recall into a single number?", opts:["Accuracy","AUC-ROC","F1 Score","MSE"], ans:2, exp:"F1 Score = harmonic mean of Precision and Recall. Use when you need both to be good (common in imbalanced datasets)."},
    {q:"After deploying an ML model, the BEST way to measure business success is:", opts:["F1 score improvement","ROI and customer satisfaction","Training loss decrease","Number of parameters"], ans:1, exp:"Business success = ROI (was it worth the money?) + customer satisfaction. Technical metrics (F1, loss) measure model performance, not business value."}
   ]
  },
  {id:5, domain:1, icon:"⚖️", title:"Overfitting, Underfitting, Drift & Leakage", xp:150,
   cards:[
    {title:"The Four Model Problems", content:"<table><tr><th>Problem</th><th>Symptom</th><th>Analogy</th></tr><tr><td><b>Overfitting</b></td><td>Great on training, BAD on test data</td><td>Student memorizes answers but can't solve new problems</td></tr><tr><td><b>Underfitting</b></td><td>Bad on BOTH training and test</td><td>Student didn't study at all</td></tr><tr><td><b>Model Drift</b></td><td>Was good, now getting WORSE over time</td><td>Textbook is outdated — world changed</td></tr><tr><td><b>Data Leakage</b></td><td>Unrealistically HIGH test score, fails in production</td><td>Student accidentally saw the answer key before the exam</td></tr></table><div class='trap'>⚠️ CRITICAL TRAP: Leakage vs Overfitting — BOTH fail in production. But leakage has HIGH test scores (looks too good). Overfitting has LOW test scores.</div>"},
    {title:"Solutions", content:"<p><b>Fix Overfitting:</b></p><ul><li>More training data</li><li>Regularization (L1/L2)</li><li>Dropout (randomly disable neurons)</li><li>Early stopping</li><li>Cross-validation</li></ul><p><b>Fix Underfitting:</b></p><ul><li>More complex model</li><li>More features</li><li>Train longer</li><li>Remove too much regularization</li></ul><p><b>Fix Drift:</b></p><ul><li>Monitor with SageMaker Model Monitor</li><li>Retrain on fresh data</li><li>Set up alerts for performance degradation</li></ul><p><b>Fix Leakage:</b></p><ul><li>Audit your data pipeline</li><li>Ensure test data is truly separate</li><li>Remove features that 'leak' the answer</li></ul>"},
    {title:"Bias vs Variance", content:"<p><b>Bias</b> = How far off the model's average prediction is from truth</p><p>→ High bias = underfitting (model too simple, misses patterns)</p><p><b>Variance</b> = How much predictions change with different training data</p><p>→ High variance = overfitting (model too sensitive to training data)</p><div class='highlight'>The goal: LOW bias + LOW variance = good generalization.<br>• High bias, low variance = underfitting<br>• Low bias, high variance = overfitting<br>• The 'sweet spot' balances both</div>"}
   ],
   questions:[
    {q:"A model scores 99% on test data but performs poorly when deployed to production. Most likely cause:", opts:["Overfitting","Underfitting","Data leakage","Model drift"], ans:2, exp:"HIGH test score + BAD production = DATA LEAKAGE. Test data somehow contained information from training (or future data leaked in). Overfitting shows LOW test scores."},
    {q:"A fraud detection model worked well for 6 months but accuracy has been dropping. This is:", opts:["Overfitting","Underfitting","Model drift","Data leakage"], ans:2, exp:"Was good → now bad over time = MODEL DRIFT. The real-world patterns changed (new fraud tactics) but the model wasn't retrained."},
    {q:"A model performs poorly on both training AND test data. The fix is:", opts:["Add regularization","Use a more complex model","Collect less data","Reduce features"], ans:1, exp:"Bad on both = UNDERFITTING. Model is too simple. Fix: use more complex model, add more features, train longer."},
    {q:"Which AWS service helps detect model drift in production?", opts:["SageMaker Ground Truth","SageMaker Clarify","SageMaker Model Monitor","Amazon Bedrock"], ans:2, exp:"SageMaker Model Monitor = continuously monitors deployed models for data quality and drift. Alerts you when model performance degrades."},
    {q:"High variance in a model means:", opts:["The model is too simple","The model memorizes training data and varies wildly on new data","The model has high bias","The model underfits"], ans:1, exp:"High variance = model is too sensitive to training data (overfitting). Small changes in training data cause big changes in predictions."}
   ]
  },
  {id:6, domain:1, icon:"🔄", title:"ML Pipeline & MLOps", xp:100,
   cards:[
    {title:"The ML Pipeline (7 Steps)", content:"<ol><li><b>Data Collection</b> — Gather raw data (S3, databases, APIs)</li><li><b>Data Preparation</b> — Clean, transform, feature engineering (Glue, DataBrew, SageMaker Data Wrangler)</li><li><b>Model Selection</b> — Choose algorithm (SageMaker built-in, JumpStart)</li><li><b>Training</b> — Feed data to model, learn patterns (SageMaker Training)</li><li><b>Evaluation</b> — Test on held-out data (accuracy, F1, etc.)</li><li><b>Deployment</b> — Put model in production (SageMaker Endpoints, Lambda)</li><li><b>Monitoring</b> — Watch for drift, errors (Model Monitor, CloudWatch)</li></ol><div class='highlight'>Key: It's a CYCLE, not linear. You often go back to earlier steps (e.g., if evaluation is bad → change model or get more data).</div>"},
    {title:"MLOps Principles", content:"<p><b>MLOps</b> = DevOps practices applied to ML. Making ML production-ready and maintainable.</p><ul><li><b>Experimentation</b> — Track experiments (SageMaker Experiments)</li><li><b>Reproducibility</b> — Same data + same code = same results</li><li><b>Automation</b> — CI/CD for ML (SageMaker Pipelines)</li><li><b>Monitoring</b> — Detect drift, data quality issues</li><li><b>Model Registry</b> — Version control for models</li><li><b>Scalability</b> — Handle growing workloads</li><li><b>Technical Debt</b> — Manage complexity over time</li></ul><div class='trap'>⚠️ TRAP: MLOps is NOT just deployment. It covers the ENTIRE lifecycle including experimentation, monitoring, and retraining.</div>"},
    {title:"Model Deployment Options", content:"<table><tr><th>Option</th><th>When to use</th><th>AWS Service</th></tr><tr><td><b>Managed API</b></td><td>Fastest, no infra management</td><td>Bedrock, Comprehend, Rekognition</td></tr><tr><td><b>Self-hosted endpoint</b></td><td>Custom models, full control</td><td>SageMaker Endpoints</td></tr><tr><td><b>Serverless</b></td><td>Unpredictable traffic, cost savings</td><td>SageMaker Serverless, Lambda</td></tr><tr><td><b>Edge deployment</b></td><td>Low latency, offline needed</td><td>SageMaker Edge, IoT Greengrass</td></tr></table><div class='highlight'>Managed API (Bedrock) = easiest, fastest to market, least expertise needed.<br>Self-hosted = most control but you manage everything.</div>"}
   ],
   questions:[
    {q:"What is the correct order of the ML pipeline?", opts:["Train → Collect → Deploy → Evaluate","Collect → Prepare → Train → Evaluate → Deploy → Monitor","Deploy → Train → Evaluate → Collect","Prepare → Collect → Train → Monitor"], ans:1, exp:"Correct order: Collect data → Prepare/clean → Train model → Evaluate performance → Deploy → Monitor. It's a cycle — you iterate."},
    {q:"A team wants to automatically retrain their model when drift is detected. This is an example of:", opts:["Feature engineering","MLOps automation","Transfer learning","Data augmentation"], ans:1, exp:"Auto-retraining based on drift detection = MLOps automation. SageMaker Pipelines + Model Monitor can trigger retraining automatically."},
    {q:"Which is the FASTEST way to deploy an AI model with the LEAST expertise?", opts:["SageMaker custom training + endpoint","AWS managed API (e.g., Bedrock, Comprehend)","Self-hosted on EC2","Edge deployment"], ans:1, exp:"Managed APIs = zero ML expertise needed. Just call an API. Bedrock, Comprehend, Rekognition — all fully managed, no training required."},
    {q:"SageMaker Pipelines is used for:", opts:["Real-time inference","Building CI/CD automation for ML workflows","Data labeling","Model explanation"], ans:1, exp:"SageMaker Pipelines = CI/CD for ML. Automates the end-to-end workflow: data prep → training → evaluation → deployment. Core MLOps tool."},
    {q:"Managing 'technical debt' in MLOps means:", opts:["Reducing cloud costs","Managing growing complexity and maintenance burden of ML systems over time","Training models faster","Using fewer features"], ans:1, exp:"Technical debt in ML = accumulating complexity (outdated models, undocumented pipelines, dead code). MLOps practices keep it manageable."}
   ]
  },
  {id:7, domain:1, icon:"🛠️", title:"AWS AI Services", xp:100,

    {title:"More AI Services", content:"<table><tr><th>Service</th><th>What it does</th></tr><tr><td><b>Kendra</b></td><td>Intelligent SEARCH across enterprise documents</td></tr><tr><td><b>Personalize</b></td><td>Real-time RECOMMENDATIONS (like Amazon.com)</td></tr><tr><td><b>Fraud Detector</b></td><td>Detect online fraud (payments, accounts)</td></tr><tr><td><b>CodeWhisperer/Q Developer</b></td><td>AI code suggestions & IDE assistant</td></tr><tr><td><b>Amazon Q Business</b></td><td>Enterprise AI assistant (search, summarize, analyze company data)</td></tr><tr><td><b>HealthScribe</b></td><td>Medical transcription with clinical notes</td></tr></table><div class='highlight'>Remember: These are ALL managed services = no ML knowledge needed, just call the API. AWS handles everything.</div>"},
    {title:"Service Selection Decision Tree", content:"<p><b>Need to analyze TEXT?</b> → Comprehend</p><p><b>Need to extract text from DOCUMENTS/IMAGES?</b> → Textract</p><p><b>Need SPEECH → TEXT?</b> → Transcribe</p><p><b>Need TEXT → SPEECH?</b> → Polly</p><p><b>Need to analyze IMAGES/VIDEO?</b> → Rekognition</p><p><b>Need TRANSLATION?</b> → Translate</p><p><b>Need a CHATBOT?</b> → Lex</p><p><b>Need SEARCH over documents?</b> → Kendra</p><p><b>Need RECOMMENDATIONS?</b> → Personalize</p><p><b>Need to BUILD/TRAIN custom models?</b> → SageMaker</p><p><b>Need to USE foundation models?</b> → Bedrock</p><div class='trap'>⚠️ TRAP: Textract ≠ Rekognition. Textract = text from documents. Rekognition = objects/faces in images/video.</div>"}

  {id:8, domain:1, icon:"🏗️", title:"SageMaker Features", xp:100,
   cards:[
    {title:"SageMaker — The Full ML Platform", content:"<p>Amazon SageMaker AI = complete platform to BUILD, TRAIN, and DEPLOY custom ML models.</p><table><tr><th>Feature</th><th>Purpose</th></tr><tr><td><b>Ground Truth</b></td><td>DATA LABELING (humans label your data)</td></tr><tr><td><b>Data Wrangler</b></td><td>Data preparation & feature engineering (visual)</td></tr><tr><td><b>Autopilot</b></td><td>AutoML — automatically builds models for you</td></tr><tr><td><b>JumpStart</b></td><td>Pre-trained model hub (150+ models, one-click deploy)</td></tr><tr><td><b>Training</b></td><td>Train models at scale (distributed, GPU)</td></tr><tr><td><b>Endpoints</b></td><td>Deploy models for real-time inference</td></tr></table><div class='highlight'>SageMaker = when you need CUSTOM models. Bedrock = when you want PRE-BUILT foundation models.</div>"},
    {title:"SageMaker MLOps & Monitoring", content:"<table><tr><th>Feature</th><th>Purpose</th></tr><tr><td><b>Pipelines</b></td><td>CI/CD for ML — automate end-to-end workflows</td></tr><tr><td><b>Model Registry</b></td><td>Version control for models (track, approve, deploy)</td></tr><tr><td><b>Model Monitor</b></td><td>Detect DRIFT in production models</td></tr><tr><td><b>Experiments</b></td><td>Track & compare training runs</td></tr><tr><td><b>Debugger</b></td><td>Debug training issues (vanishing gradients, overfitting)</td></tr><tr><td><b>Feature Store</b></td><td>Central repository for ML features (reusable across teams)</td></tr></table><div class='trap'>⚠️ Key pairs to remember:<br>• Ground Truth = LABELING data<br>• Clarify = BIAS detection + EXPLAINABILITY<br>• Model Monitor = DRIFT detection<br>• Autopilot = AUTO-builds models (AutoML)</div>"},

    {title:"Decision Guide", content:"<p><b>Use Traditional ML when:</b></p><ul><li>✅ You have lots of structured/tabular data</li><li>✅ Regulatory requirements need EXPLAINABILITY</li><li>✅ Task is well-defined (predict one specific thing)</li><li>✅ Low latency is critical</li><li>✅ Cost predictability matters (fixed hosting)</li></ul><p><b>Use Foundation Models when:</b></p><ul><li>✅ Working with unstructured data (text, images)</li><li>✅ Need general-purpose intelligence</li><li>✅ Little or no labeled training data</li><li>✅ Multiple tasks (summarize, translate, Q&A)</li><li>✅ Rapid prototyping / time to market matters</li></ul><div class='highlight'>Key insight: Traditional ML = specialist (one task, high accuracy). FM = generalist (many tasks, good at most).</div>"},

var LESSONS_D2 = [
  {id:10, domain:2, icon:"🎭", title:"Foundation Models, Tokens & Context Window", xp:100,
   cards:[
    {title:"What is a Foundation Model?", content:"<p>A <b>Foundation Model (FM)</b> = a large AI model pre-trained on massive data that can be adapted for many tasks.</p><ul><li>Trained on billions of text/images from the internet</li><li>Can do multiple tasks without retraining (translation, summarization, coding)</li><li>Examples: Claude, GPT-4, Amazon Nova, Titan, Llama, Stable Diffusion</li></ul><p><b>Key properties:</b></p><ul><li>General purpose (unlike traditional ML = one task)</li><li>Expensive to train ($millions), cheap to use</li><li>Can be customized via prompting, fine-tuning, or RAG</li></ul><div class='highlight'>FM = pre-trained generalist. You DON'T train it from scratch. You adapt it (prompt engineering, fine-tuning, RAG).</div>"},
    {title:"Tokens & Context Window", content:"<p><b>Token</b> = smallest unit the model processes. Roughly 1 token ≈ ¾ of a word (4 characters).</p><p>'Hello world' = 2 tokens. 'Unbelievable' = 3 tokens.</p><p><b>Context Window</b> = maximum tokens the model can see at once (input + output COMBINED).</p><div class='trap'>⚠️ CRITICAL EXAM TRAP: Context window = Input + Output COMBINED!<br>If context window = 128K tokens and input uses 100K → only 28K left for output (NOT 128K output).</div><p><b>Why it matters:</b></p><ul><li>Larger window = can process longer documents</li><li>But cost increases with more tokens</li><li>Model may lose focus on very long inputs ('lost in the middle' problem)</li></ul>"},
    {title:"Token-Based Pricing", content:"<p>Most FMs charge PER TOKEN:</p><ul><li><b>Input tokens</b> = what you send (usually cheaper)</li><li><b>Output tokens</b> = what model generates (usually more expensive, typically 3-5x input price)</li></ul><p><b>Cost optimization strategies:</b></p><ul><li>Use shorter prompts (fewer input tokens)</li><li>Set max output length</li><li>Use smaller/cheaper models for simple tasks</li><li>Batch requests where possible</li><li>Cache repeated prompts (prompt caching)</li></ul><div class='highlight'>Pricing formula: Cost = (input_tokens × input_price) + (output_tokens × output_price)<br><br>Amazon Nova is designed to be cost-efficient (cheaper per token than many alternatives).</div>"}
   ],
   questions:[
    {q:"A model has a 128K token context window. You send 100K tokens as input. How many tokens can the output be?", opts:["128K","100K","28K","228K"], ans:2, exp:"Context window = Input + Output COMBINED. 128K - 100K input = 28K available for output. NOT 128K!"},
    {q:"Approximately how many tokens is the sentence 'The quick brown fox jumps over the lazy dog'?", opts:["3","5","9-10","20"], ans:2, exp:"1 token ≈ ¾ word. This sentence has 9 words ≈ 9-10 tokens. (Some short words = 1 token, some longer words = 2+ tokens.)"},
    {q:"To reduce FM inference costs, the MOST effective approach is:", opts:["Use a larger model","Write longer prompts for clarity","Use shorter prompts and set max output length","Always use real-time inference"], ans:2, exp:"Fewer tokens = lower cost. Shorter prompts + limiting output length directly reduces the token count. Larger models cost MORE per token."},
    {q:"What makes Foundation Models different from traditional ML models?", opts:["FMs are smaller and faster","FMs are trained on task-specific data only","FMs are pre-trained on broad data and can handle multiple tasks","FMs don't use neural networks"], ans:2, exp:"FMs = pre-trained on massive diverse data, can do many tasks. Traditional ML = trained on specific dataset for one task."},
    {q:"Which pricing component is typically MORE expensive for FM inference?", opts:["Input tokens","Output tokens","Storage","Network transfer"], ans:1, exp:"Output tokens are typically 3-5x more expensive than input tokens. The model does more computation to GENERATE text than to READ it."}
   ]

  {id:11, domain:2, icon:"🌡️", title:"Temperature, Top-p & Inference Parameters", xp:100,
   cards:[
    {title:"Temperature", content:"<p><b>Temperature</b> = controls randomness/creativity of output.</p><ul><li><b>Temperature 0</b> = deterministic, always picks most likely word. Best for: factual answers, code, math.</li><li><b>Temperature 0.5</b> = balanced. Best for: general tasks.</li><li><b>Temperature 1.0+</b> = very creative/random. Best for: creative writing, brainstorming, poetry.</li></ul><div class='highlight'>Low temperature = focused, predictable, factual<br>High temperature = creative, diverse, surprising<br><br>Think of it as a 'creativity dial' 🎛️</div><div class='trap'>⚠️ TRAP: High temperature does NOT make the model smarter. It just makes it pick less likely words more often (more random ≠ better).</div>"},
    {title:"Top-p (Nucleus Sampling)", content:"<p><b>Top-p</b> = limits the model to choosing from the top tokens whose cumulative probability reaches p.</p><ul><li><b>Top-p = 0.1</b> = only considers the top 10% most likely tokens (more focused)</li><li><b>Top-p = 0.9</b> = considers top 90% of tokens (more diverse)</li><li><b>Top-p = 1.0</b> = considers ALL tokens</li></ul><p><b>Temperature vs Top-p:</b></p><ul><li>Both control randomness — usually adjust ONE, not both</li><li>Temperature: scales all probabilities</li><li>Top-p: cuts off unlikely tokens entirely</li></ul><div class='highlight'>For exam: Temperature is asked more often. Remember the pattern:<br>• Need facts/code → low temperature (0-0.3)<br>• Need creativity → high temperature (0.7-1.0)</div>"},
    {title:"Other Parameters", content:"<table><tr><th>Parameter</th><th>What it controls</th></tr><tr><td><b>Max tokens</b></td><td>Maximum output length (limits cost & response size)</td></tr><tr><td><b>Stop sequences</b></td><td>Tokens that signal 'stop generating'</td></tr><tr><td><b>Top-k</b></td><td>Only consider the top K most likely next tokens</td></tr><tr><td><b>Frequency penalty</b></td><td>Penalize repeating the same words (reduce repetition)</td></tr><tr><td><b>Presence penalty</b></td><td>Encourage talking about new topics</td></tr></table><div class='highlight'>For the exam, focus on Temperature and Top-p. These are the most commonly tested inference parameters.</div>"}
   ],
   questions:[
    {q:"A developer wants the FM to generate the same factual answer every time for a customer FAQ bot. Best temperature?", opts:["0 (or very low)","0.5","1.0","1.5"], ans:0, exp:"Factual, consistent answers = Temperature 0. This makes the model deterministic — same input always gives same output."},
    {q:"For a creative writing application that generates story ideas, the best temperature setting is:", opts:["0","0.1","0.7-1.0","It doesn't matter"], ans:2, exp:"Creative tasks need diversity and unexpected combinations = high temperature (0.7-1.0). Low temperature would give boring, predictable outputs."},
    {q:"Top-p = 0.1 means the model:", opts:["Considers all possible tokens","Only considers the top 10% most probable tokens","Generates 10 tokens maximum","Has 10% chance of hallucinating"], ans:1, exp:"Top-p (nucleus sampling) = cumulative probability cutoff. 0.1 means only the most likely tokens (whose probabilities sum to 10%) are considered."},
    {q:"To reduce FM response length and control costs, use:", opts:["Lower temperature","Higher top-p","Max tokens parameter","Frequency penalty"], ans:2, exp:"Max tokens = hard limit on output length. Directly controls cost (fewer output tokens = less money). Temperature affects randomness, not length."},
    {q:"Setting temperature to 0 makes the model:", opts:["Faster","More creative","Deterministic (same output for same input)","More accurate at math automatically"], ans:2, exp:"Temperature 0 = always picks the highest probability token = deterministic. Same prompt → same answer. Doesn't make it 'smarter' though."}

  {id:12, domain:2, icon:"✍️", title:"Prompting Techniques", xp:150,
   cards:[
    {title:"Prompt Engineering Basics", content:"<p><b>Prompt Engineering</b> = crafting input text to get the best output from an FM.</p><p><b>Parts of a good prompt:</b></p><ul><li><b>Context</b> — background info the model needs</li><li><b>Instruction</b> — what you want it to do</li><li><b>Input data</b> — the content to process</li><li><b>Output format</b> — how you want the answer structured</li><li><b>Negative prompts</b> — what NOT to include</li></ul><div class='highlight'>Example: 'You are a helpful AWS expert (context). Summarize (instruction) the following article (input) in 3 bullet points (format). Do not include pricing details (negative prompt).'</div>"},
    {title:"Prompting Techniques", content:"<table><tr><th>Technique</th><th>Description</th><th>When to use</th></tr><tr><td><b>Zero-shot</b></td><td>No examples given</td><td>Simple tasks the model already knows</td></tr><tr><td><b>One-shot</b></td><td>1 example given</td><td>Show the pattern you want</td></tr><tr><td><b>Few-shot</b></td><td>2-5 examples given</td><td>Complex patterns, specific formats</td></tr><tr><td><b>Chain-of-thought</b></td><td>'Think step by step'</td><td>Math, reasoning, logic problems</td></tr><tr><td><b>Prompt templates</b></td><td>Reusable prompt structures with variables</td><td>Production apps, consistency</td></tr></table><div class='highlight'>Key insight: More examples = better for complex/unusual tasks but costs more tokens.<br>Chain-of-thought = magic words for reasoning tasks ('Let's think step by step').</div>"},
    {title:"Best Practices & Negative Prompts", content:"<p><b>Best practices:</b></p><ul><li>Be SPECIFIC and CONCISE (don't be vague)</li><li>Use examples (few-shot) for complex outputs</li><li>Structure with clear sections (context | instruction | format)</li><li>Iterate and experiment (prompt engineering is trial-and-error)</li><li>Set guardrails in the prompt (what NOT to do)</li></ul><p><b>Negative prompts:</b></p><ul><li>Tell the model what to AVOID</li><li>'Do NOT make up information'</li><li>'Do NOT include personal opinions'</li><li>In image generation: 'no text, no watermarks'</li></ul><div class='trap'>⚠️ TRAP: Negative prompts work for text AND image generation. For image models (Stable Diffusion, Nova Canvas), they specify what should NOT appear in the image.</div>"}
   ],
   questions:[
    {q:"A developer gives an FM the instruction: 'Classify this review as positive or negative: Great product!' with no examples. This technique is:", opts:["Few-shot","One-shot","Zero-shot","Chain-of-thought"], ans:2, exp:"Zero-shot = no examples provided. You just give the instruction and expect the model to figure it out from its training."},
    {q:"To improve an FM's math accuracy, the BEST technique is:", opts:["Increase temperature","Use chain-of-thought prompting","Use zero-shot","Add negative prompts"], ans:1, exp:"Chain-of-thought ('think step by step') dramatically improves reasoning/math. Forces the model to show its work rather than jumping to an answer."},
    {q:"In image generation, specifying 'no blurry, no text, no watermarks' is an example of:", opts:["Few-shot prompting","Chain-of-thought","Negative prompting","Zero-shot"], ans:2, exp:"Negative prompts = specifying what should NOT appear in the output. Works in both text generation and image generation."},

  {id:13, domain:2, icon:"💰", title:"RAG vs Fine-tuning vs In-context (Cost Ladder)", xp:150,
   cards:[
    {title:"The FM Customization Ladder", content:"<p>From cheapest/simplest to most expensive/complex:</p><ol><li><b>Prompt Engineering</b> — just change the prompt ($0, instant)</li><li><b>In-context Learning</b> — put examples/data IN the prompt ($ - costs more tokens)</li><li><b>RAG</b> — retrieve relevant docs and inject into prompt ($$ - need vector DB)</li><li><b>Fine-tuning</b> — retrain the model on your data ($$$ - need data + compute)</li><li><b>Continued Pre-training</b> — extend training on domain corpus ($$$$ - expensive)</li><li><b>Pre-training from scratch</b> — build your own FM ($$$$$ - millions of dollars)</li></ol><div class='highlight'>Exam loves this ladder! Start simple (prompt eng) → only go expensive if simple doesn't work.</div>"},
    {title:"RAG (Retrieval Augmented Generation)", content:"<p><b>RAG</b> = Give the FM access to YOUR data at query time (without retraining).</p><p><b>How it works:</b></p><ol><li>User asks a question</li><li>System RETRIEVES relevant documents from a knowledge base</li><li>Retrieved docs are added to the prompt as context</li><li>FM generates answer using BOTH its training AND your docs</li></ol><p><b>Benefits of RAG:</b></p><ul><li>✅ Up-to-date information (no retraining needed)</li><li>✅ Cites sources (reduces hallucinations)</li><li>✅ Cheaper than fine-tuning</li><li>✅ Works with ANY FM</li></ul><div class='highlight'>RAG = 'open book exam' for the AI. It can look up answers in YOUR documents.<br>Fine-tuning = 'studying for weeks' to internalize knowledge.</div>"},
    {title:"When to Use What", content:"<table><tr><th>Need</th><th>Best approach</th><th>AWS Service</th></tr><tr><td>Use current company docs</td><td>RAG</td><td>Bedrock Knowledge Bases</td></tr><tr><td>Change model's style/behavior</td><td>Fine-tuning</td><td>Bedrock Custom Models</td></tr><tr><td>Add domain expertise</td><td>Continued pre-training</td><td>Bedrock/SageMaker</td></tr><tr><td>Simple task with good base model</td><td>Prompt engineering</td><td>Bedrock Playground</td></tr><tr><td>Smaller, faster version of big model</td><td>Distillation</td><td>Bedrock Model Distillation</td></tr></table><div class='trap'>⚠️ EXAM TRAP: 'Company needs AI to answer questions about internal docs that change weekly' → RAG (not fine-tuning!) because data changes frequently. Fine-tuning = static knowledge baked in.</div>"}

    {title:"GenAI Advantages", content:"<ul><li><b>Adaptability</b> — Works across many tasks without retraining</li><li><b>Content generation</b> — Creates text, images, code, video, audio</li><li><b>Conversational</b> — Natural dialog with context understanding</li><li><b>Responsiveness</b> — Instant answers at scale</li><li><b>Few/zero-shot</b> — Works with minimal or no examples</li><li><b>Creativity</b> — Novel combinations, brainstorming</li><li><b>Scalability</b> — Serves millions of users simultaneously</li></ul><div class='highlight'>GenAI's superpower: ONE model does MANY tasks (summarize, translate, code, chat, analyze) vs traditional ML which needs a separate model for each task.</div>"},

    {q:"A customer service team wants an AI that responds consistently to the same question every time. GenAI's limitation here is:", opts:["It can't understand questions","Nondeterminism (different answers each time)","It's too slow","It costs too much"], ans:1, exp:"Nondeterminism = same prompt may produce different outputs. For consistent answers, use low temperature, but you can't guarantee identical responses."},

    {q:"Amazon Nova supports text, images, and video. This makes it a:", opts:["Single-modal model","Multi-modal model","Traditional ML model","Rule-based system"], ans:1, exp:"Multi-modal = handles multiple types of data (text + image + video). Nova is Amazon's multi-modal FM family."}
   ]
  },
  {id:15, domain:2, icon:"🤖", title:"Agentic AI: MCP, Multi-agent & Orchestration", xp:150,
   cards:[
    {title:"What is Agentic AI?", content:"<p><b>Agentic AI</b> = AI that can autonomously plan, decide, and ACT — not just generate text.</p><p><b>Key capabilities:</b></p><ul><li><b>Tool usage</b> — Can call APIs, search web, run code</li><li><b>Memory</b> — Remembers context across interactions</li><li><b>Planning</b> — Breaks complex tasks into steps</li><li><b>Decision making</b> — Chooses what to do next based on results</li><li><b>Autonomy</b> — Works without constant human direction</li></ul><p><b>Loop pattern:</b> Think → Act → Observe → Repeat</p><div class='highlight'>GenAI = generates content. Agentic AI = generates content AND takes actions in the real world (books flights, writes files, sends emails).</div>"},
    {title:"MCP & Multi-Agent Systems", content:"<p><b>Model Context Protocol (MCP)</b> = standardized way to connect AI agents to external tools/data.</p><ul><li>Like a 'USB port' for AI — any tool can plug in using the same standard</li><li>Separates the AI model from the tools it can use</li><li>Makes agents portable across different AI systems</li></ul><p><b>Multi-Agent Patterns:</b></p><ul><li><b>Orchestrator-Worker</b> — One agent coordinates, others execute</li><li><b>Peer-to-peer</b> — Agents communicate as equals</li><li><b>Hierarchical</b> — Chain of command</li><li><b>Competitive</b> — Multiple agents solve same problem, pick best answer</li></ul><div class='highlight'>MCP is NEW on the exam. Think of it as: 'Standard connector format that lets any agent use any tool.'</div>"},
    {title:"AWS Agentic Services", content:"<table><tr><th>Service</th><th>What it does</th></tr><tr><td><b>Bedrock Agents</b></td><td>Build agents that can call APIs, query DBs, take actions</td></tr><tr><td><b>Strands Agents</b></td><td>Open-source framework for building agents (code-first)</td></tr><tr><td><b>Bedrock AgentCore</b></td><td>Deploy & manage agents at scale (infra for agents)</td></tr><tr><td><b>Amazon Q</b></td><td>Enterprise AI assistant (pre-built agentic capabilities)</td></tr></table><p><b>Workflow Orchestration:</b></p><ul><li>Step Functions — orchestrate multi-step agent workflows</li><li>Event-driven — agents triggered by events (new email, data change)</li><li>Human-in-the-loop — agent pauses for human approval on critical actions</li></ul><div class='trap'>⚠️ Key distinction:<br>• Bedrock Agents = BUILD your own agents<br>• AgentCore = DEPLOY & MANAGE agents at scale<br>• Strands = Open-source agent FRAMEWORK (code-level)</div>"}
   ],
   questions:[
    {q:"Model Context Protocol (MCP) is best described as:", opts:["A training methodology for LLMs","A standardized interface connecting AI agents to external tools and data","A security protocol for AI","A prompt engineering technique"], ans:1, exp:"MCP = standard protocol for connecting agents to tools. Like a universal 'adapter' that lets any agent use any tool through the same interface."},
    {q:"An AI that plans a vacation by searching flights, comparing hotels, checking your calendar, and booking — all autonomously — is an example of:", opts:["Generative AI","Traditional ML","Agentic AI","Supervised learning"], ans:2, exp:"Autonomous planning + tool usage + multi-step actions = Agentic AI. It's not just generating text — it's acting in the world."},
    {q:"Which AWS service provides open-source, code-first agent development?", opts:["Amazon Bedrock Agents","Amazon Strands Agents","Amazon Bedrock AgentCore","Amazon Q"], ans:1, exp:"Strands Agents = open-source, code-first framework for building agents. Bedrock Agents = managed/no-code. AgentCore = deployment infrastructure."},
    {q:"In a multi-agent system, one 'manager' agent assigns tasks to specialized 'worker' agents. This pattern is:", opts:["Peer-to-peer","Competitive","Orchestrator-Worker","Consensus"], ans:2, exp:"Orchestrator-Worker = one agent coordinates (plans, assigns, reviews) while others execute specialized tasks. Most common enterprise pattern."},
    {q:"An agent needs human approval before sending a payment over $10,000. This is:", opts:["Fully autonomous AI","Human-in-the-loop pattern","Supervised learning","Model drift"], ans:1, exp:"Human-in-the-loop = agent pauses for human approval on critical/high-risk actions. Balances automation with safety for consequential decisions."}
   ]
  },
  {id:16, domain:2, icon:"☁️", title:"AWS GenAI Services (Bedrock, Q, Nova, Kiro)", xp:100,
   cards:[
    {title:"Amazon Bedrock — The GenAI Platform", content:"<p><b>Amazon Bedrock</b> = fully managed service to access multiple FMs through one API.</p><p><b>Available models:</b></p><ul><li>Amazon Nova (Amazon's own — text, image, video)</li><li>Amazon Titan (text, embeddings, image)</li><li>Anthropic Claude (advanced reasoning)</li><li>Meta Llama (open-source)</li><li>Mistral, Cohere, Stability AI, AI21</li></ul><p><b>Key benefits:</b></p><ul><li>No infrastructure to manage</li><li>Switch between models easily</li><li>Data stays private (not used for model training)</li><li>Enterprise security (VPC, encryption, IAM)</li></ul><div class='highlight'>Bedrock = 'model marketplace' — try different FMs, pick the best one for your task, all through one API.</div>"},
    {title:"Amazon Nova & Titan", content:"<p><b>Amazon Nova</b> (newest):</p><ul><li>Nova Micro — text in, text out. Fastest, cheapest, no image/video input</li><li>Nova Lite — low-cost multimodal: text + image + video input, text output</li><li>Nova Pro — balanced multimodal: text + image + video input, text output, stronger reasoning</li><li>Nova Premier — most capable Nova model, used as a 'teacher' for model distillation</li><li>Nova Canvas — image generation</li><li>Nova Reel — video generation</li></ul><p><b>Amazon Titan</b> (earlier generation):</p><ul><li>Titan Text — text generation</li><li>Titan Embeddings — convert text to vectors (for RAG)</li><li>Titan Image — image generation</li></ul><div class='highlight'>Nova vs Titan: Nova is NEWER, cheaper, faster, and supports video. Titan was first. Both are Amazon's own models. Exam tip: Nova Micro = text-only; Lite/Pro/Premier = multimodal (text+image+video in, text out).</div>"},
    {title:"Other AWS GenAI Services", content:"<table><tr><th>Service</th><th>What it does</th></tr><tr><td><b>Amazon Q Business</b></td><td>Enterprise AI assistant (search, summarize company data, take actions)</td></tr><tr><td><b>Amazon Q Developer</b></td><td>AI coding assistant (code completion, debugging, transformation)</td></tr><tr><td><b>Kiro</b></td><td>AI-powered IDE — full development environment with specs, hooks, steering</td></tr><tr><td><b>PartyRock</b></td><td>No-code GenAI app builder (experiment without AWS account)</td></tr><tr><td><b>SageMaker JumpStart</b></td><td>150+ pre-trained models, one-click deploy</td></tr></table><div class='trap'>⚠️ Key distinctions:<br>• Bedrock = ACCESS FMs via API<br>• Q Business = ENTERPRISE assistant (like company ChatGPT)<br>• Q Developer = CODING assistant<br>• Kiro = Full AI IDE<br>• PartyRock = NO-CODE experimenting</div>"}

  {id:17, domain:3, icon:"🏰", title:"Bedrock Features (KB, Agents, Guardrails, Eval)", xp:150,
   cards:[
    {title:"Bedrock Knowledge Bases", content:"<p><b>Bedrock Knowledge Bases</b> = managed RAG service.</p><ol><li>Upload your documents (PDFs, web pages, databases)</li><li>Bedrock automatically chunks, embeds, and indexes them</li><li>At query time, retrieves relevant chunks and feeds to FM</li></ol><p><b>Supported vector stores:</b></p><ul><li>Amazon OpenSearch Serverless</li><li>Amazon Aurora PostgreSQL</li><li>Pinecone, Redis Enterprise</li></ul><div class='highlight'>Knowledge Bases = EASIEST way to do RAG on AWS. No manual chunking, embedding, or vector DB setup needed — Bedrock handles everything.</div>"},
    {title:"Bedrock Agents & Guardrails", content:"<p><b>Bedrock Agents:</b></p><ul><li>Give FM ability to TAKE ACTIONS (call APIs, query databases)</li><li>Define 'action groups' — what the agent can do</li><li>Agent autonomously decides which actions to take</li><li>Can combine Knowledge Bases + Actions</li></ul><p><b>Bedrock Guardrails:</b></p><ul><li>Content filtering — block harmful/inappropriate content</li><li>Topic blocking — prevent discussing certain subjects</li><li>Word filters — block specific words/phrases</li><li>PII redaction — automatically remove personal info</li><li>Contextual grounding — check if response is grounded in source</li></ul><div class='trap'>⚠️ Guardrails = safety layer that sits BETWEEN the user and the model. Works with ANY model on Bedrock.</div>"},
    {title:"Bedrock Model Evaluation & Other Features", content:"<table><tr><th>Feature</th><th>Purpose</th></tr><tr><td><b>Model Evaluation</b></td><td>Compare models on your specific tasks (automatic + human eval)</td></tr><tr><td><b>Custom Models</b></td><td>Fine-tune or continue pre-training models on your data</td></tr><tr><td><b>Prompt Management</b></td><td>Version, test, and manage prompts (like Git for prompts)</td></tr><tr><td><b>Data Automation</b></td><td>Automatically extract, transform data from documents</td></tr><tr><td><b>Model Distillation</b></td><td>Create smaller, faster versions of large models</td></tr><tr><td><b>Prompt Caching</b></td><td>Cache repeated prompt prefixes to reduce cost/latency</td></tr></table><div class='highlight'>Model Evaluation lets you run the SAME questions through multiple models and compare results. Great for picking which model to use.</div>"}
   ],

    {q:"To prevent a customer-facing AI from discussing competitor products, use:", opts:["Temperature = 0","Bedrock Guardrails (topic blocking)","Fine-tuning","Smaller model"], ans:1, exp:"Guardrails topic blocking = prevent the model from discussing specified subjects. Perfect for controlling what the AI talks about."},
    {q:"Bedrock Prompt Management helps teams:", opts:["Train models faster","Version and manage prompts across environments (like Git for prompts)","Generate images","Reduce hallucinations"], ans:1, exp:"Prompt Management = version control for prompts. Track changes, test variations, promote from dev to prod. Ensures consistency."},
    {q:"To automatically remove customer Social Security numbers from AI responses, use:", opts:["Bedrock Guardrails (PII redaction)","Model fine-tuning","Temperature = 0","Prompt engineering"], ans:0, exp:"Guardrails PII redaction = automatically detects and removes/masks personal information (SSN, credit cards, phone numbers) from responses."},
    {q:"Prompt caching in Bedrock helps with:", opts:["Improving model accuracy","Reducing cost and latency for repeated prompt prefixes","Training models faster","Adding new knowledge"], ans:1, exp:"Prompt caching = if many requests share the same prompt prefix (system prompt), cache it to avoid reprocessing. Saves tokens = saves money and time."}

  {id:18, domain:3, icon:"⚖️", title:"FM Selection Criteria & Cost Tradeoffs", xp:100,
   cards:[
    {title:"How to Choose a Foundation Model", content:"<table><tr><th>Criterion</th><th>Consider</th></tr><tr><td><b>Task/Modality</b></td><td>Text only? Text+Image? Video? Code?</td></tr><tr><td><b>Quality</b></td><td>Accuracy on your specific use case</td></tr><tr><td><b>Latency</b></td><td>How fast must responses be?</td></tr><tr><td><b>Cost</b></td><td>Token pricing, provisioned vs on-demand</td></tr><tr><td><b>Context window</b></td><td>How long are your inputs?</td></tr><tr><td><b>Multilingual</b></td><td>Support for non-English languages?</td></tr><tr><td><b>Compliance</b></td><td>Data residency, certifications</td></tr><tr><td><b>Customization</b></td><td>Can it be fine-tuned for your needs?</td></tr><tr><td><b>Licensing</b></td><td>Open source vs proprietary restrictions?</td></tr></table><div class='highlight'>No single model is best for everything. Pick based on YOUR requirements. Bedrock Model Evaluation helps you compare.</div>"},
    {title:"Cost Models & Tradeoffs", content:"<p><b>On-demand pricing:</b></p><ul><li>Pay per token (input + output)</li><li>No commitment, scale to zero</li><li>Best for: variable workloads, experimentation</li></ul><p><b>Provisioned Throughput:</b></p><ul><li>Reserved capacity (guaranteed performance)</li><li>Pay fixed hourly rate regardless of usage</li><li>Best for: consistent high-volume workloads</li></ul><p><b>Batch inference:</b></p><ul><li>Submit jobs, get results later (not real-time)</li><li>Up to 50% cheaper than on-demand</li><li>Best for: non-urgent processing</li></ul><div class='highlight'>Cost optimization: Use SMALLEST model that meets quality requirements. Nova Micro (cheapest) → Nova Lite → Nova Pro (most capable). Don't use a cannon to kill a fly!</div>"},
    {title:"Model Size & Complexity Tradeoffs", content:"<p><b>Smaller models (Nova Micro, Titan Lite):</b></p><ul><li>✅ Faster, cheaper, lower latency</li><li>✅ Good for simple tasks (classification, extraction)</li><li>❌ Less capable for complex reasoning</li></ul><p><b>Larger models (Claude, Nova Pro):</b></p><ul><li>✅ Better reasoning, more accurate</li><li>✅ Handle complex multi-step tasks</li><li>❌ Slower, more expensive</li></ul><div class='trap'>⚠️ EXAM PATTERN: 'Most cost-effective solution for [simple task]' → pick smallest model.<br>'Best accuracy for [complex task]' → pick largest model.<br>Balance based on the specific requirement in the question.</div>"}
   ],
   questions:[

    {q:"For consistent, predictable latency on high-volume production workloads, use:", opts:["On-demand pricing","Provisioned Throughput","Batch inference","Serverless"], ans:1, exp:"Provisioned Throughput = reserved capacity with guaranteed performance. No cold starts, consistent latency. Best for high-volume production."},
    {q:"A company processes 100,000 documents overnight (results needed by morning, not real-time). Best pricing:", opts:["On-demand","Provisioned Throughput","Batch inference (up to 50% cheaper)","Real-time endpoints"], ans:2, exp:"Not real-time + large volume = batch inference. Up to 50% cheaper because AWS can schedule processing during off-peak times."},
    {q:"When choosing between models, 'modality' refers to:", opts:["The model's cost","The types of data it handles (text, image, video, audio)","The model's speed","The model's accuracy"], ans:1, exp:"Modality = types of input/output the model supports. Text-only, text+image (multimodal), text+image+video (Nova Pro)."},
    {q:"A multinational company needs an FM that works well in 20+ languages. The key selection criterion is:", opts:["Model size","Multilingual capability","Cost","Latency"], ans:1, exp:"20+ languages = multilingual capability is the primary criterion. Not all models perform equally in non-English languages."}
